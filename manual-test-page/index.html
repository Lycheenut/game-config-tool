<!doctype html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
    <title>Config Tool Test Page</title>
</head>
<body>
    <div id="config-tool"></div>

        import { newConfigTool } from '/src/ConfigTool.js';

        await handle.load();
